server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:8000"

agent:
  max_iterations: 20
  timeout_seconds: 120
  interrupt_on:
    - delete_adgroups
    - modify_budget
    - pause_campaign

persistence:
  type: local
  data_dir: ./data

skills:
  system_dir: ./skills/system

sub_agents:
  system_dir: ./sub_agents/system
